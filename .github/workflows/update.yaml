name: Check for updates
on:
  schedule:
    - cron: '0 * * * *' # Run hourly
  workflow_dispatch: {}

jobs:
  update-flatpak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Get latest release tag
        id: latest
        run: |
          TAG=$(curl -fsSL https://api.github.com/repos/soulfiremc-com/SoulFireClient/releases/latest | jq -r '.tag_name')
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV

      - name: Download .debs
        run: |
          AMD64_URL="https://github.com/soulfiremc-com/SoulFireClient/releases/download/${RELEASE_TAG}/SoulFire-${RELEASE_TAG}-amd64.deb"
          AARCH64_URL="https://github.com/soulfiremc-com/SoulFireClient/releases/download/${RELEASE_TAG}/SoulFire-${RELEASE_TAG}-arm64.deb"
          METAINFO_URL="https://raw.githubusercontent.com/soulfiremc-com/SoulFireClient/${RELEASE_TAG}/com.soulfiremc.soulfire.metainfo.xml"
          wget "$AMD64_URL" -O $RUNNER_TEMP/soulfire_amd64.deb
          wget "$AARCH64_URL" -O $RUNNER_TEMP/soulfire_aarch64.deb
          wget "$METAINFO_URL" -O $RUNNER_TEMP/com.soulfiremc.soulfire.metainfo.xml
          echo "AMD64_URL=$AMD64_URL" >> $GITHUB_ENV
          echo "AARCH64_URL=$AARCH64_URL" >> $GITHUB_ENV
          echo "METAINFO_URL=$METAINFO_URL" >> $GITHUB_ENV

      - name: Calculate SHA256s
        id: hashes
        run: |
          SHA_AMD64=$(sha256sum $RUNNER_TEMP/soulfire_amd64.deb | cut -d ' ' -f1)
          SHA_AARCH64=$(sha256sum $RUNNER_TEMP/soulfire_aarch64.deb | cut -d ' ' -f1)
          SHA_METAINFO=$(sha256sum $RUNNER_TEMP/com.soulfiremc.soulfire.metainfo.xml | cut -d ' ' -f1)
          echo "sha_amd64=$SHA_AMD64" >> $GITHUB_OUTPUT
          echo "sha_aarch64=$SHA_AARCH64" >> $GITHUB_OUTPUT
          echo "sha_metainfo=$SHA_METAINFO" >> $GITHUB_OUTPUT

      - name: Update manifest
        env:
          SHA_AMD64: ${{ steps.hashes.outputs.sha_amd64 }}
          SHA_AARCH64: ${{ steps.hashes.outputs.sha_aarch64 }}
          SHA_METAINFO: ${{ steps.hashes.outputs.sha_metainfo }}
        run: |
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          file = Path("com.soulfiremc.soulfire.yml")
          text = file.read_text()

          replacements = [
              (
                  r"(\s+url: )[^\n]+SoulFire-[^\n]+-amd64\.deb\n(\s+sha256: )[0-9a-f]+",
                  os.environ["AMD64_URL"],
                  os.environ["SHA_AMD64"],
              ),
              (
                  r"(\s+url: )[^\n]+SoulFire-[^\n]+-arm64\.deb\n(\s+sha256: )[0-9a-f]+",
                  os.environ["AARCH64_URL"],
                  os.environ["SHA_AARCH64"],
              ),
              (
                  r"(\s+url: )[^\n]+com\.soulfiremc\.soulfire\.metainfo\.xml\n(\s+sha256: )[0-9a-f]+",
                  os.environ["METAINFO_URL"],
                  os.environ["SHA_METAINFO"],
              ),
          ]

          for pattern, url, sha256 in replacements:
              text, count = re.subn(
                  pattern,
                  lambda match: f"{match.group(1)}{url}\n{match.group(2)}{sha256}",
                  text,
                  count=1,
              )
              if count != 1:
                  raise SystemExit(f"Expected one manifest match for {url}, found {count}")

          file.write_text(text)
          PY

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update SoulFire Flatpak to ${{ env.RELEASE_TAG }}"
          branch: update/soulfire-${{ env.RELEASE_TAG }}
          title: "chore: update SoulFire to ${{ env.RELEASE_TAG }}"
          body: |
            This PR updates the amd64 and aarch64 `.deb` sources, plus the AppStream metadata source, in the Flatpak manifest for version `${{ env.RELEASE_TAG }}`.
            Auto-generated by GitHub Actions.
          labels: auto-update
          assignees: AlexProgrammerDE
