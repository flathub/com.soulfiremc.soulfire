id: com.soulfiremc.soulfire

runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'

command: soulfire
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=com.canonical.Unity
  - --env=ELECTRON_TRASH=gio
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  # for Discord RPC mods
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
  # Profile drag&drop
  - --filesystem=xdg-download:ro
  # Userspace visibility for manual hugepages configuration
  # Required for -XX:+UseLargePages
  - --filesystem=/sys/kernel/mm/hugepages:ro
  # Userspace visibility for transparent hugepages configuration
  # Required for -XX:+UseTransparentHugePages
  - --filesystem=/sys/kernel/mm/transparent_hugepage:ro

modules:
  - name: soulfire
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/soulfiremc-com/SoulFireClient/releases/download/2.9.0/SoulFire-2.9.0-amd64.deb
        sha256: e19cc090a635191437b4b58eb3cdef2447cdc4e26efc724a03b6faa1a638852e
        only-arches: [x86_64]
        dest-filename: soulfire.deb
      - type: file
        url: https://github.com/soulfiremc-com/SoulFireClient/releases/download/2.9.0/SoulFire-2.9.0-arm64.deb
        sha256: 5bd186ace89609fbadaf79d2a9e70d48602e4c740067f03bf6c24444bcc4f203
        only-arches: [aarch64]
        dest-filename: soulfire.deb
      - type: file
        url: https://raw.githubusercontent.com/soulfiremc-com/SoulFireClient/2.9.0/com.soulfiremc.soulfire.metainfo.xml
        sha256: 7b8773ed901353fe3aed192d093a39dd3da696707891fc0bf83daacdc886aa25
      - type: script
        dest-filename: soulfire
        commands:
          - zypak-wrapper.sh /app/SoulFire/soulfire --ozone-platform-hint=auto "$@"
    build-commands:
      - bsdtar -Oxf soulfire.deb "$(bsdtar -tf soulfire.deb | grep '^data.tar')" | bsdtar -xf -
      - cp -a opt/SoulFire /app/SoulFire
      - patch-electron-desktop-filename /app/SoulFire/resources/app.asar
      - install -Dm755 soulfire /app/bin/soulfire
      - desktop-file-edit --set-key=Exec --set-value='soulfire %U' --set-icon=com.soulfiremc.soulfire usr/share/applications/soulfire.desktop
      - install -Dm644 usr/share/applications/soulfire.desktop /app/share/applications/com.soulfiremc.soulfire.desktop
      - install -Dm644 usr/share/icons/hicolor/512x512/apps/soulfire.png /app/share/icons/hicolor/512x512/apps/com.soulfiremc.soulfire.png
      - install -Dm644 com.soulfiremc.soulfire.metainfo.xml /app/share/metainfo/com.soulfiremc.soulfire.metainfo.xml
